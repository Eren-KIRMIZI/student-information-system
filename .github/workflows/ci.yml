name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # =====================================================
  # LINT & FORMAT
  # =====================================================
  lint:
    name: 🔍 Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend deps
        run: npm ci --prefix backend --legacy-peer-deps

      - name: Install frontend deps
        run: npm ci --prefix frontend

      - name: Lint backend
        run: npm run lint --prefix backend

      - name: Lint frontend
        run: npm run lint --prefix frontend

      - name: Format check backend
        run: npm run format:check --prefix backend

      - name: Format check frontend
        run: npm run format:check --prefix frontend

  # =====================================================
  # PRISMA SCHEMA CHECK
  # =====================================================
  prisma-check:
    name: 🗄️ Prisma Schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend deps
        run: npm ci --prefix backend --legacy-peer-deps

      - name: Validate Prisma schema
        run: npx prisma validate --schema=backend/prisma/schema.prisma

      - name: Format check Prisma schema
        run: npx prisma format --schema=backend/prisma/schema.prisma --check

  # =====================================================
  # BACKEND TESTS
  # =====================================================
  test-backend:
    name: 🧪 Backend Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: obs_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/obs_test?schema=public
      JWT_SECRET: test-secret-key-that-is-long-enough
      JWT_REFRESH_SECRET: test-refresh-secret-key-that-is-long
      REDIS_URL: redis://localhost:6379
      CACHE_ENABLED: "false"
      QUEUE_ENABLED: "false"
      AUDIT_ENABLED: "false"
      NODE_ENV: test
      LOG_LEVEL: error

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend deps
        run: npm ci --prefix backend --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate --schema=backend/prisma/schema.prisma

      - name: Run database migrations
        run: npx prisma migrate deploy --schema=backend/prisma/schema.prisma
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/obs_test?schema=public

      - name: Run backend tests
        run: npm run test:coverage --prefix backend

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 7

  # =====================================================
  # FRONTEND TESTS
  # =====================================================
  test-frontend:
    name: 🧪 Frontend Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci --prefix frontend

      - name: Run frontend tests
        run: npm run test --prefix frontend --if-present

  # =====================================================
  # BUILD
  # =====================================================
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install all deps
        run: |
          npm ci --prefix backend --legacy-peer-deps
          npm ci --prefix frontend

      - name: Generate Prisma client
        run: npx prisma generate --schema=backend/prisma/schema.prisma

      - name: Build frontend
        run: npm run build --prefix frontend

      - name: Upload frontend dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7
